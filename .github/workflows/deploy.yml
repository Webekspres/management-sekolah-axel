name: deploy

on:
  push:
    branches:
      - dev

jobs:
  test:
    name: Test before deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Build assets
        run: npm run build

      - name: Run tests
        run: ./vendor/bin/pest

  deploy:
    name: Deploy to dev.portal
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 120
    environment: Development

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Composer dependencies for Vite build
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Bundle composer.phar for server (no SSH required)
        run: curl -fsSL https://getcomposer.org/download/latest-stable/composer.phar -o composer.phar

      - name: Audit deploy payload size
        run: php scripts/deploy-audit.php

      - name: Deploy to server via FTP
        id: ftp_deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          timeout: 120000
          log-level: minimal
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/.env
            **/.env.*
            **/.env.example
            **/tests/**
            **/storage/**
            **/.phpunit*
            **/Homestead.*
            **/.idea/**
            **/.vscode/**
            **/.cursor/**
            **/.fleet/**
            **/.nova/**
            **/.zed/**
            **/.kiro/**
            **/.kiro_tmp/**
            **/.claude/**
            **/.agents/**
            **/database/factories/**
            **/scripts/**
            **/*.md
            **/pest-last.json
            **/debug-*.log
            **/auth.json
            **/.cpanel.yml
            **/composer.lock.bak

      - name: Retry FTP deploy (resume from sync state)
        id: ftp_deploy_retry
        if: steps.ftp_deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          timeout: 120000
          log-level: minimal
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git/**
            **/.github/**
            **/node_modules/**
            **/vendor/**
            **/.env
            **/.env.*
            **/.env.example
            **/tests/**
            **/storage/**
            **/.phpunit*
            **/Homestead.*
            **/.idea/**
            **/.vscode/**
            **/.cursor/**
            **/.fleet/**
            **/.nova/**
            **/.zed/**
            **/.kiro/**
            **/.kiro_tmp/**
            **/.claude/**
            **/.agents/**
            **/database/factories/**
            **/scripts/**
            **/*.md
            **/pest-last.json
            **/debug-*.log
            **/auth.json
            **/.cpanel.yml
            **/composer.lock.bak

      - name: Verify FTP deploy succeeded
        run: |
          if [ "${{ steps.ftp_deploy.outcome }}" = "success" ]; then
            echo "FTP deploy succeeded on first attempt."
            exit 0
          fi
          if [ "${{ steps.ftp_deploy_retry.outcome }}" = "success" ]; then
            echo "FTP deploy succeeded on retry (resumed from sync state)."
            exit 0
          fi
          echo "FTP deploy failed after retry."
          exit 1

      - name: Run post-deploy release hook
        run: |
          set -euo pipefail
          BASE="${{ secrets.DEPLOY_URL }}"
          TOKEN="${{ secrets.DEPLOY_SECRET }}"

          # Shared hosting (cPanel/LiteSpeed) often drops HTTP/2 streams during long
          # composer/migrate requests — curl exit 92. Force HTTP/1.1 and retry.
          deploy_curl() {
            local url="$1"
            local max_time="${2:-900}"
            local attempt response exit_code

            for attempt in 1 2 3; do
              set +e
              response=$(curl -sS --http1.1 \
                --connect-timeout 30 \
                --max-time "${max_time}" \
                -H "Accept: application/json, text/plain, */*" \
                -H "User-Agent: Mozilla/5.0 (compatible; AxelSchoolDeploy/1.0)" \
                -w '\nHTTP_STATUS:%{http_code}' \
                "${url}")
              exit_code=$?
              set -e

              if [ "${exit_code}" -eq 0 ]; then
                echo "${response}"
                return 0
              fi

              echo "curl attempt ${attempt}/3 failed for ${url} (exit ${exit_code}); retrying in 5s..." >&2
              sleep 5
            done

            echo "${response}"
            return "${exit_code}"
          }

          echo "Clearing stale route cache on server (no SSH)..."
          deploy_curl "${BASE}/deploy-route-cache-clear.php?token=${TOKEN}" 120 \
            || echo "Route cache clear skipped (file may not exist yet)."

          echo "Running release hook..."
          set +e
          RELEASE_RESPONSE=$(deploy_curl "${BASE}/deploy/${TOKEN}/release" 900)
          RELEASE_CURL_EXIT=$?
          set -e

          if [ "${RELEASE_CURL_EXIT}" -ne 0 ]; then
            echo "Release hook request failed after retries (curl exit ${RELEASE_CURL_EXIT})."
          else
            RELEASE_STATUS=$(echo "${RELEASE_RESPONSE}" | sed -n 's/^HTTP_STATUS://p')
            RELEASE_JSON=$(echo "${RELEASE_RESPONSE}" | sed '/^HTTP_STATUS:/d')
            echo "${RELEASE_JSON}"
            if [ "${RELEASE_STATUS}" = "200" ] && echo "${RELEASE_JSON}" | grep -q '"status":"success"'; then
              echo "Release hook succeeded."
              exit 0
            fi
            echo "Release hook returned non-success (HTTP ${RELEASE_STATUS:-unknown})."
          fi

          echo "Release hook failed — trying individual deploy endpoints..."
          deploy_curl "${BASE}/deploy-route-cache-clear.php?token=${TOKEN}" 120 || true
          deploy_curl "${BASE}/deploy/${TOKEN}/composer-install" 900
          deploy_curl "${BASE}/deploy/${TOKEN}/migrate" 300
          deploy_curl "${BASE}/deploy/${TOKEN}/optimize" 300
          echo "Individual deploy hooks completed."
