name: CI

on:
  push:
    branches:
      - dev
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - dev
      - develop
      - main
      - master
      - workos
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        options:
          - dev.portal.hstkb.sch.id
          - portal.hstkb.sch.id

permissions:
  contents: read

env:
  CI: true
  PEST_PROPERTY_ITERATIONS: 20
  FTP_DEPLOY_EXCLUDE: |
    **/.git*
    **/.git/**
    **/.github/**
    **/node_modules/**
    **/vendor/**
    **/.env
    **/.env.*
    **/.env.example
    **/tests/**
    **/storage/**
    **/.phpunit*
    **/Homestead.*
    **/.idea/**
    **/.vscode/**
    **/.cursor/**
    **/.fleet/**
    **/.nova/**
    **/.zed/**
    **/.kiro/**
    **/.kiro_tmp/**
    **/.claude/**
    **/.agents/**
    **/database/factories/**
    **/scripts/**
    **/*.md
    **/pest-last.json
    **/debug-*.log
    **/auth.json
    **/.cpanel.yml
    **/composer.lock.bak

jobs:
  lint:
    name: Lint
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: Testing
    concurrency:
      group: ci-checks-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"

      - name: Install dependencies
        run: |
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
          npm install

      - name: Run Pint
        run: composer lint

  test:
    name: Test
    if: github.event_name != 'workflow_dispatch'
    needs: lint
    runs-on: ubuntu-latest
    environment: Testing
    concurrency:
      group: ci-checks-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2
          extensions: sockets

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.composer-cache.outputs.dir }}
            vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Install Node dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Run PHP tests (parallel)
        run: ./vendor/bin/pest --parallel --testsuite=Unit,Feature --exclude-group=serial

      - name: Run serial PHP tests
        run: ./vendor/bin/pest --group=serial

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        run: ./vendor/bin/pest --parallel --testsuite=Browser

  resolve-target:
    name: Resolve deployment target
    needs: [lint, test]
    if: >-
      always() &&
      !cancelled() &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'push' &&
          (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main') &&
          needs.lint.result == 'success' &&
          needs.test.result == 'success'
        )
      )
    runs-on: ubuntu-latest
    outputs:
      deploy_host: ${{ steps.target.outputs.deploy_host }}
      environment: ${{ steps.target.outputs.environment }}

    steps:
      - name: Resolve target from branch or manual input
        id: target
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ github.event.inputs.target }}"
          else
            case "${{ github.ref_name }}" in
              main)
                target="portal.hstkb.sch.id"
                ;;
              dev)
                target="dev.portal.hstkb.sch.id"
                ;;
              *)
                echo "Unsupported branch for deploy."
                exit 1
                ;;
            esac
          fi

          case "${target}" in
            portal.hstkb.sch.id)
              environment="Production"
              ;;
            dev.portal.hstkb.sch.id)
              environment="Development"
              ;;
            *)
              echo "Unsupported deployment target: ${target}"
              exit 1
              ;;
          esac

          echo "deploy_host=${target}" >> "${GITHUB_OUTPUT}"
          echo "environment=${environment}" >> "${GITHUB_OUTPUT}"

  deploy:
    name: Deploy to ${{ needs.resolve-target.outputs.deploy_host }}
    needs: resolve-target
    runs-on: ubuntu-latest
    timeout-minutes: 120
    environment: ${{ needs.resolve-target.outputs.environment }}
    concurrency:
      group: deploy-${{ needs.resolve-target.outputs.deploy_host }}
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Composer dependencies for Vite build
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Bundle composer.phar for server (no SSH required)
        run: curl -fsSL https://getcomposer.org/download/latest-stable/composer.phar -o composer.phar

      - name: Audit deploy payload size
        run: php scripts/deploy-audit.php

      - name: Deploy to server via FTP
        id: ftp_deploy
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          timeout: 120000
          log-level: minimal
          dangerous-clean-slate: false
          exclude: ${{ env.FTP_DEPLOY_EXCLUDE }}

      - name: Retry FTP deploy (resume from sync state)
        id: ftp_deploy_retry
        if: steps.ftp_deploy.outcome == 'failure'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          protocol: ftps
          timeout: 120000
          log-level: minimal
          dangerous-clean-slate: false
          exclude: ${{ env.FTP_DEPLOY_EXCLUDE }}

      - name: Verify FTP deploy succeeded
        run: |
          if [ "${{ steps.ftp_deploy.outcome }}" = "success" ]; then
            echo "FTP deploy succeeded on first attempt."
            exit 0
          fi
          if [ "${{ steps.ftp_deploy_retry.outcome }}" = "success" ]; then
            echo "FTP deploy succeeded on retry (resumed from sync state)."
            exit 0
          fi
          echo "FTP deploy failed after retry."
          exit 1

      - name: Run post-deploy release hook
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          set -eo pipefail
          BASE="${DEPLOY_URL//$'\r'/}"
          BASE="${BASE//$'\n'/}"
          BASE="${BASE%/}"

          ENCODED_TOKEN="$(python3 -c 'import os, urllib.parse; print(urllib.parse.quote(os.environ["DEPLOY_SECRET"].strip(), safe=""))')"

          # Shared hosting (cPanel/LiteSpeed) often drops HTTP/2 streams during long
          # composer/migrate requests — curl exit 92. Force HTTP/1.1 and retry.
          deploy_curl() {
            local url="$1"
            local label="${2:-deploy hook}"
            local max_time="${3:-900}"
            local attempt response exit_code

            for attempt in 1 2 3; do
              set +e
              response=$(curl -sS --globoff --http1.1 \
                --connect-timeout 30 \
                --max-time "${max_time}" \
                -H "Accept: application/json, text/plain, */*" \
                -H "User-Agent: Mozilla/5.0 (compatible; AxelSchoolDeploy/1.0)" \
                -w '\nHTTP_STATUS:%{http_code}' \
                "${url}")
              exit_code=$?
              set -e

              if [ "${exit_code}" -eq 0 ]; then
                echo "${response}"
                return 0
              fi

              echo "curl attempt ${attempt}/3 failed for ${label} (exit ${exit_code}); retrying in 5s..." >&2
              sleep 5
            done

            echo "${response}"
            return "${exit_code}"
          }

          echo "Clearing stale route cache on server (no SSH)..."
          deploy_curl "${BASE}/deploy-route-cache-clear.php?token=${ENCODED_TOKEN}" "route cache clear" 120 \
            || echo "Route cache clear skipped (file may not exist yet)."

          echo "Installing Composer dependencies on server (vendor/ is not uploaded via FTP)..."
          deploy_curl "${BASE}/deploy-composer-install.php?token=${ENCODED_TOKEN}" "composer install" 900 \
            || echo "Composer install hook skipped (file may not exist yet)."

          echo "Running release hook..."
          set +e
          RELEASE_RESPONSE=$(deploy_curl "${BASE}/deploy/${ENCODED_TOKEN}/release" "release" 900)
          RELEASE_CURL_EXIT=$?
          set -e

          if [ "${RELEASE_CURL_EXIT}" -ne 0 ]; then
            echo "Release hook request failed after retries (curl exit ${RELEASE_CURL_EXIT})."
          else
            RELEASE_STATUS=$(echo "${RELEASE_RESPONSE}" | sed -n 's/^HTTP_STATUS://p')
            RELEASE_JSON=$(echo "${RELEASE_RESPONSE}" | sed '/^HTTP_STATUS:/d')
            echo "${RELEASE_JSON}"
            if [ "${RELEASE_STATUS}" = "200" ] && echo "${RELEASE_JSON}" | grep -q '"status":"success"'; then
              echo "Release hook succeeded."
              exit 0
            fi
            echo "Release hook returned non-success (HTTP ${RELEASE_STATUS:-unknown})."
          fi

          echo "Release hook failed — trying individual deploy endpoints..."
          set +e
          deploy_curl "${BASE}/deploy-route-cache-clear.php?token=${ENCODED_TOKEN}" "route cache clear" 120 || true
          deploy_curl "${BASE}/deploy-composer-install.php?token=${ENCODED_TOKEN}" "composer install" 900 || true
          deploy_curl "${BASE}/deploy/${ENCODED_TOKEN}/composer-install" "composer-install" 900
          COMPOSER_EXIT=$?
          deploy_curl "${BASE}/deploy/${ENCODED_TOKEN}/migrate" "migrate" 300
          MIGRATE_EXIT=$?
          deploy_curl "${BASE}/deploy/${ENCODED_TOKEN}/optimize" "optimize" 300
          OPTIMIZE_EXIT=$?
          set -e

          if [ "${COMPOSER_EXIT}" -ne 0 ] || [ "${MIGRATE_EXIT}" -ne 0 ] || [ "${OPTIMIZE_EXIT}" -ne 0 ]; then
            echo "One or more individual deploy hooks failed."
            exit 1
          fi

          echo "Individual deploy hooks completed."
